apiVersion: apps/v1
kind: Deployment
metadata: { name: synthcohort, labels: { app: synthcohort } }
spec:
  replicas: 1
  selector: { matchLabels: { app: synthcohort } }
  template:
    metadata: { labels: { app: synthcohort } }
    spec:
      containers:
        - name: synthcohort
          image: ghcr.io/cognis-digital/synthcohort:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: synthcohort }
spec:
  selector: { app: synthcohort }
  ports: [{ port: 80, targetPort: 8000 }]
